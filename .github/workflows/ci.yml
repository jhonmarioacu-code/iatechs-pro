name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: iatechs_pro_testing
      DB_USERNAME: iatechs
      DB_PASSWORD: iatechs

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: iatechs_pro_testing
          POSTGRES_USER: iatechs
          POSTGRES_PASSWORD: iatechs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iatechs -d iatechs_pro_testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none
          extensions: mbstring, pgsql, pdo_pgsql, pdo_sqlite, sqlite3

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Prepare environment
        run: |
          cp .env.testing .env
          php artisan key:generate --ansi

      - name: Static analysis
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress app

      - name: Run tests
        run: php artisan test

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend diagnostics
        run: |
          node -v
          npm -v
          ls -la
          ls -la vite.config.js

      - name: Frontend build
        run: npm run build
