name: Security

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-sca:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci

      - name: Composer audit
        run: composer audit --locked

      - name: NPM audit (prod)
        run: npm audit --omit=dev --audit-level=high

  trivy-fs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            aquasec/trivy:0.57.1 \
            fs /src \
            --scanners vuln \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1

  trivy-config:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy IaC misconfiguration scan
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            aquasec/trivy:0.57.1 \
            config /src \
            --severity HIGH,CRITICAL \
            --exit-code 1

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
