name: Deploy

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
      deploy_ref:
        description: "Git ref to deploy (branch or commit)"
        required: true
        default: "main"
        type: string
      run_migrations:
        description: "Run database migrations"
        required: true
        default: true
        type: boolean
      php_fpm_service:
        description: "PHP-FPM service name"
        required: true
        default: "php8.4-fpm"
        type: string
      nginx_service:
        description: "Nginx service name"
        required: true
        default: "nginx"
        type: string
      run_observability_checks:
        description: "Run observability postdeploy checks"
        required: true
        default: true
        type: boolean
      validate_prometheus_stack:
        description: "Require Prometheus/Alertmanager/Grafana stack checks"
        required: true
        default: false
        type: boolean
      provision_observability_stack:
        description: "Provision observability secrets/env and run docker compose profile"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  security-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none
          extensions: mbstring, pgsql, pdo_pgsql, pdo_sqlite, sqlite3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci

      - name: Composer audit
        run: composer audit --locked

      - name: NPM audit (prod)
        run: npm audit --omit=dev --audit-level=high

  precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: security-gates
    environment: ${{ inputs.target_env }}
    steps:
      - name: Validate input
        run: |
          set -euo pipefail
          if [ "${{ inputs.target_env }}" != "production" ]; then
            echo "Only production deploy is allowed in this workflow."
            exit 1
          fi
          echo "Precheck OK for env=${{ inputs.target_env }} ref=${{ inputs.deploy_ref }}"

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          OBS_EXPORTER_TOKEN: ${{ secrets.OBS_EXPORTER_TOKEN }}
          OBS_ALERTS_SLACK_WEBHOOK_URL: ${{ secrets.OBS_ALERTS_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          [ -n "$SSH_HOST" ] || (echo "Missing secret SSH_HOST" && exit 1)
          [ -n "$SSH_PORT" ] || (echo "Missing secret SSH_PORT" && exit 1)
          [ -n "$SSH_USER" ] || (echo "Missing secret SSH_USER" && exit 1)
          [ -n "$SSH_PRIVATE_KEY" ] || (echo "Missing secret SSH_PRIVATE_KEY" && exit 1)
          [ -n "$DEPLOY_PATH" ] || (echo "Missing secret DEPLOY_PATH" && exit 1)

          if [ "${{ inputs.provision_observability_stack }}" = "true" ]; then
            [ -n "$OBS_EXPORTER_TOKEN" ] || (echo "Missing secret OBS_EXPORTER_TOKEN" && exit 1)
            [ -n "$OBS_ALERTS_SLACK_WEBHOOK_URL" ] || (echo "Missing secret OBS_ALERTS_SLACK_WEBHOOK_URL" && exit 1)
          fi

          echo "Secret validation OK"

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: precheck
    environment: ${{ inputs.target_env }}
    steps:
      - name: Deploy over SSH with rollback-on-error
        uses: appleboy/ssh-action@v1.2.0
        env:
          OBS_EXPORTER_TOKEN_SECRET: ${{ secrets.OBS_EXPORTER_TOKEN }}
          OBS_ALERTS_SLACK_WEBHOOK_SECRET: ${{ secrets.OBS_ALERTS_SLACK_WEBHOOK_URL }}
          OBS_EXPORTER_ALLOWED_IPS_SECRET: ${{ secrets.OBS_EXPORTER_ALLOWED_IPS }}
          PROMETHEUS_RETENTION_TIME_SECRET: ${{ secrets.PROMETHEUS_RETENTION_TIME }}
          GRAFANA_ADMIN_USER_SECRET: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD_SECRET: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: OBS_EXPORTER_TOKEN_SECRET,OBS_ALERTS_SLACK_WEBHOOK_SECRET,OBS_EXPORTER_ALLOWED_IPS_SECRET,PROMETHEUS_RETENTION_TIME_SECRET,GRAFANA_ADMIN_USER_SECRET,GRAFANA_ADMIN_PASSWORD_SECRET
          script_stop: true
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_REF="${{ inputs.deploy_ref }}"
            RUN_MIGRATIONS="${{ inputs.run_migrations }}"
            PHP_FPM_SERVICE="${{ inputs.php_fpm_service }}"
            NGINX_SERVICE="${{ inputs.nginx_service }}"
            RUN_OBS_CHECKS="${{ inputs.run_observability_checks }}"
            VALIDATE_PROM_STACK="${{ inputs.validate_prometheus_stack }}"
            PROVISION_OBS_STACK="${{ inputs.provision_observability_stack }}"
            DEPLOY_USER="$(id -un)"
            DEPLOY_GROUP="$(id -gn)"
            NPM_CACHE_PATH="${HOME}/.npm"
            TS="$(date +%Y%m%d_%H%M%S)"
            OBS_EXPORTER_TOKEN_SECRET="${OBS_EXPORTER_TOKEN_SECRET:-}"
            OBS_ALERTS_SLACK_WEBHOOK_SECRET="${OBS_ALERTS_SLACK_WEBHOOK_SECRET:-}"
            OBS_EXPORTER_ALLOWED_IPS_SECRET="${OBS_EXPORTER_ALLOWED_IPS_SECRET:-}"
            PROMETHEUS_RETENTION_TIME_SECRET="${PROMETHEUS_RETENTION_TIME_SECRET:-}"
            GRAFANA_ADMIN_USER_SECRET="${GRAFANA_ADMIN_USER_SECRET:-}"
            GRAFANA_ADMIN_PASSWORD_SECRET="${GRAFANA_ADMIN_PASSWORD_SECRET:-}"

            run_docker_compose() {
              if ! command -v docker >/dev/null 2>&1; then
                return 1
              fi

              if docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
                docker compose "$@"
                return $?
              fi

              if sudo -n docker info >/dev/null 2>&1 && sudo -n docker compose version >/dev/null 2>&1; then
                sudo -n docker compose "$@"
                return $?
              fi

              return 1
            }

            set_env_value() {
              local key="$1"
              local value="$2"
              local escaped
              escaped="$(printf '%s' "$value" | sed -e 's/[\/&]/\\&/g')"

              if grep -qE "^${key}=" .env; then
                sed -i "s/^${key}=.*/${key}=${escaped}/" .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }

            cd "$DEPLOY_PATH"

            PREV_SHA="$(git rev-parse HEAD)"
            echo "Previous SHA: $PREV_SHA"

            rollback() {
              local exit_code="${1:-1}"
              local failed_line="${2:-unknown}"
              local failed_command="${3:-unknown}"
              echo "Deploy failed on line ${failed_line} while running: ${failed_command} (exit code ${exit_code})"
              echo "Starting rollback to $PREV_SHA..."
              git reset --hard "$PREV_SHA"
              php artisan optimize:clear || true
              php artisan config:cache || true
              php artisan route:cache || true
              php artisan view:cache || true
              sudo systemctl restart "$PHP_FPM_SERVICE" || true
              sudo systemctl reload "$NGINX_SERVICE" || true
              curl -fsS http://127.0.0.1/health || true
              echo "Rollback completed."
            }

            on_error() {
              local exit_code="$?"
              local failed_line="${BASH_LINENO[0]}"
              local failed_command="${BASH_COMMAND:-unknown}"
              rollback "$exit_code" "$failed_line" "$failed_command"
              exit "$exit_code"
            }

            trap on_error ERR

            [ -f .env ] || (echo "Missing .env file in ${DEPLOY_PATH}" && exit 1)
            if [ ! -w .env ]; then
              echo "Adjusting .env ownership to ${DEPLOY_USER}:${DEPLOY_GROUP}"
              sudo chown "${DEPLOY_USER}:${DEPLOY_GROUP}" .env
            fi

            sudo cp .env "/tmp/iatechs-pro.env.$TS.bak"
            sudo tar -czf "/tmp/iatechs-pro.storage.$TS.bak.tgz" storage

            git fetch --all --prune
            git checkout "$DEPLOY_REF"
            git pull origin "$DEPLOY_REF"

            if [ "$PROVISION_OBS_STACK" = "true" ]; then
              mkdir -p docker/observability/secrets
              umask 077
              printf '%s\n' "$OBS_EXPORTER_TOKEN_SECRET" > docker/observability/secrets/obs_exporter_token
              printf '%s\n' "$OBS_ALERTS_SLACK_WEBHOOK_SECRET" > docker/observability/secrets/slack_webhook_url
              umask 022

              set_env_value OBS_EXPORTER_ENABLED true
              set_env_value OBS_EXPORTER_TOKEN "$OBS_EXPORTER_TOKEN_SECRET"
              set_env_value OBS_EXPORTER_TOKEN_FILE "./docker/observability/secrets/obs_exporter_token"
              set_env_value OBS_ALERTS_ENABLED true
              set_env_value OBS_ALERTS_SLACK_ENABLED true
              set_env_value OBS_ALERTS_SLACK_WEBHOOK_URL "$OBS_ALERTS_SLACK_WEBHOOK_SECRET"
              set_env_value OBS_ALERTS_SLACK_WEBHOOK_FILE "./docker/observability/secrets/slack_webhook_url"

              if [ -n "$OBS_EXPORTER_ALLOWED_IPS_SECRET" ]; then
                set_env_value OBS_EXPORTER_ALLOWED_IPS "$OBS_EXPORTER_ALLOWED_IPS_SECRET"
              fi
              if [ -n "$PROMETHEUS_RETENTION_TIME_SECRET" ]; then
                set_env_value PROMETHEUS_RETENTION_TIME "$PROMETHEUS_RETENTION_TIME_SECRET"
              fi
              if [ -n "$GRAFANA_ADMIN_USER_SECRET" ]; then
                set_env_value GRAFANA_ADMIN_USER "$GRAFANA_ADMIN_USER_SECRET"
              fi
              if [ -n "$GRAFANA_ADMIN_PASSWORD_SECRET" ]; then
                set_env_value GRAFANA_ADMIN_PASSWORD "$GRAFANA_ADMIN_PASSWORD_SECRET"
              fi

              if run_docker_compose --profile observability pull prometheus alertmanager grafana; then
                echo "Observability images pulled."
              else
                echo "Skipping docker pull for observability stack (docker unavailable or insufficient permissions)."
              fi

              if run_docker_compose --profile observability up -d prometheus alertmanager grafana; then
                echo "Observability stack started."
              else
                echo "Unable to run docker compose profile=observability on target host."
                if [ "$VALIDATE_PROM_STACK" = "true" ]; then
                  exit 1
                fi
              fi
            fi

            # Runtime dirs + permisos (antes de composer)
            sudo mkdir -p bootstrap/cache
            sudo mkdir -p storage/logs
            sudo mkdir -p storage/framework/cache
            sudo mkdir -p storage/framework/sessions
            sudo mkdir -p storage/framework/views
            sudo mkdir -p storage/framework/testing

            sudo chown -R "$DEPLOY_USER":www-data storage bootstrap/cache
            sudo find storage bootstrap/cache -type d -exec chmod 2775 {} \;
            sudo find storage bootstrap/cache -type f -exec chmod 664 {} \;

            sudo touch storage/logs/laravel.log
            sudo chown "$DEPLOY_USER":www-data storage/logs/laravel.log
            sudo chmod 664 storage/logs/laravel.log

            composer install --no-dev --optimize-autoloader --no-interaction
            # Evita EACCES por archivos root-owned de ejecuciones previas.
            if [ -d node_modules ]; then
              sudo rm -rf node_modules
            fi
            sudo rm -rf "$NPM_CACHE_PATH/_cacache" || true
            sudo mkdir -p "$NPM_CACHE_PATH"
            sudo chown -R "$DEPLOY_USER:$DEPLOY_GROUP" "$NPM_CACHE_PATH"
            npm ci --cache "$NPM_CACHE_PATH" --no-audit --no-fund
            npm run build

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              php artisan migrate --force
            fi

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            sudo systemctl restart "$PHP_FPM_SERVICE"
            sudo systemctl reload "$NGINX_SERVICE"

            curl -fsS http://127.0.0.1/health

            if [ "$RUN_OBS_CHECKS" = "true" ] && [ -f deploy/observability-postdeploy-check.sh ]; then
              chmod +x deploy/observability-postdeploy-check.sh
              APP_BASE_URL="http://127.0.0.1" \
              APP_ENV_FILE=".env" \
              OBS_VALIDATE_PROM_STACK="$VALIDATE_PROM_STACK" \
              bash deploy/observability-postdeploy-check.sh
            fi

            trap - ERR
            echo "Deploy finished successfully."

  postcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy
    environment: ${{ inputs.target_env }}
    steps:
      - name: Validate health endpoint over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            curl -fsS http://127.0.0.1/health
            echo "Postcheck OK"

