global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/iatechs-slo.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: iatechs_app
    metrics_path: /api/metrics/prometheus
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:80
    authorization:
      type: Bearer
      credentials_file: /run/secrets/obs_exporter_token

