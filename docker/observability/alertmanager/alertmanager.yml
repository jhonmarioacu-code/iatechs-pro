global:
  resolve_timeout: 5m
  slack_api_url_file: /run/secrets/slack_webhook_url

route:
  receiver: iatechs-ops-slack
  group_by:
    - alertname
    - service
    - slo
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 30m

receivers:
  - name: iatechs-ops-slack
    slack_configs:
      - channel: "#iatechs-observability"
        username: "IAtechs Alertmanager"
        title: "{{ .CommonAnnotations.summary }}"
        text: |
          *Status:* {{ .Status }}
          *Alert:* {{ .CommonLabels.alertname }}
          *Service:* {{ .CommonLabels.service }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
        send_resolved: true

