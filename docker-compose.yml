services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: iatechs-pro:latest
    container_name: iatechs-pro-app
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: iatechs-pro-prometheus
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    secrets:
      - source: obs_exporter_token
        target: obs_exporter_token
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: iatechs-pro-alertmanager
    profiles: ["observability"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./docker/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    secrets:
      - source: slack_webhook_url
        target: slack_webhook_url
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    container_name: iatechs-pro-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana_admin_password}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: iatechs-pro-postgres
    environment:
      POSTGRES_DB: iatechs_pro
      POSTGRES_USER: iatechs
      POSTGRES_PASSWORD: iatechs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iatechs -d iatechs_pro"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iatechs-pro-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

secrets:
  obs_exporter_token:
    file: ${OBS_EXPORTER_TOKEN_FILE:-./docker/observability/secrets/obs_exporter_token.example}
  slack_webhook_url:
    file: ${OBS_ALERTS_SLACK_WEBHOOK_FILE:-./docker/observability/secrets/slack_webhook_url.example}
